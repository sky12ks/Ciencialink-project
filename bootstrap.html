<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <title>Página Bootstrap</title>
    
</head>
<body>

 <header class="bg-primary text-center py-3">
        <h1 class="text-white">Página Bootstrap</h1>
    </header>
<main>
    <div class="container">
        
        <h2>Grilla de Bootstrap</h2>
        
        <div class="row text-center">
            <div class="col bg-primary text-white">col</div>
            <div class="col bg-secondary text-white">col</div>
            <div class="col bg-success text-white">col</div>
        </div>
        
        <div class="row text-center">
            <div class="col-4 bg-light border">col-4</div>
            <div class="col-8 bg-secondary text-white border">col-8</div>
        </div>
        
        <div class="row text-center">
            <div class="col-6 bg-light">col-6</div>
            <div class="col bg-danger text-white">col</div>
        </div>
        
        <div class="row text-center">
            <div class="col-3 bg-warning">col-3</div>
            <div class="col-6 bg-info">col-6</div>
            <div class="col-3 bg-light">col-3</div>
        </div>

       
        <h2>Componentes de Bootstrap</h2>

        <div class="row border p-4">
            
            <div class="col-4">
                <h5>Componente Carousel</h5>
        
                <div id="carouselExampleIndicators" class="carousel slide">
                    <div class="carousel-indicators">
                        <button type="button" data-bs-target="#carouselExampleIndicators" data-bs-slide-to="0" class="active" aria-current="true" aria-label="Slide 1"></button>
                        <button type="button" data-bs-target="#carouselExampleIndicators" data-bs-slide-to="1" aria-label="Slide 2"></button>
                        <button type="button" data-bs-target="#carouselExampleIndicators" data-bs-slide-to="2" aria-label="Slide 3"></button>
                    </div>
                    <div class="carousel-inner">
                        <div class="carousel-item active">
                            <img src="https://thumbs.dreamstime.com/b/panorama-vertical-del-fondo-nocturno-de-galaxia-para-el-la-historia-noche-estrellada-y-sobre-un-paisaje-atwilight-calma-escena-399252781.jpg" class="d-block w-100" alt="Noche estrellada 1">
                        </div>
                        <div class="carousel-item">
                            <img src="https://img.freepik.com/foto-gratis/disparo-vertical-bosque-hermoso-cielo-nocturno-estrellado-ideal-fondos-pantalla_181624-13623.jpg" class="d-block w-100" alt="Noche estrellada 2">
                        </div>
                        <div class="carousel-item">
                            <img src="https://www.shutterstock.com/image-photo/milky-way-stars-rural-countryside-600nw-2667163801.jpg" class="d-block w-100" alt="Noche estrellada 3">
                        </div>
                    </div>
                    <button class="carousel-control-prev" type="button" data-bs-target="#carouselExampleIndicators" data-bs-slide="prev">
                        <span class="carousel-control-prev-icon" aria-hidden="true"></span>
                        <span class="visually-hidden">Previous</span>
                    </button>
                    <button class="carousel-control-next" type="button" data-bs-target="#carouselExampleIndicators" data-bs-slide="next">
                        <span class="carousel-control-next-icon" aria-hidden="true"></span>
                        <span class="visually-hidden">Next</span>
                    </button>
                </div>
            </div> <div class="col-8">
                <h5>Componente Accordion</h5>
        
                <div class="accordion" id="accordionExample">
                    <div class="accordion-item">
                        <h2 class="accordion-header">
                            <button class="accordion-button" type="button" data-bs-toggle="collapse" data-bs-target="#collapseOne" aria-expanded="true" aria-controls="collapseOne">
                                Descripción Imagen 1 - Accordion Item #1
                            </button>
                        </h2>
                        <div id="collapseOne" class="accordion-collapse collapse show" data-bs-parent="#accordionExample">
                            <div class="accordion-body">
                                <strong>Noches Estrelladas en Japon.</strong> Las noches en el Japón antiguo estaban marcadas por la oscuridad natural...
                            </div>
                        </div>
                    </div>
            
                    <div class="accordion-item">
                        <h2 class="accordion-header">
                            <button class="accordion-button collapsed" type="button" data-bs-toggle="collapse" data-bs-target="#collapseTwo" aria-expanded="false" aria-controls="collapseTwo">
                                Descripción Imagen 2 - Accordion Item #2
                            </button>
                        </h2>
                        <div id="collapseTwo" class="accordion-collapse collapse" data-bs-parent="#accordionExample">
                            <div class="accordion-body">
                                Contenido secundario aquí.
                            </div>
                        </div>
                    </div>
                </div>
            </div> </div>

</main>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>

</body>
</html>
